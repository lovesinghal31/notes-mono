services:
  postgres:
    image: postgres:18
    container_name: mono_fun_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=C

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

  redis-stack:
    image: redis/redis-stack:latest
    container_name: mono_fun_redis
    restart: unless-stopped

    ports:
      - "${REDIS_PORT:-6379}:6379" # Redis
      - "${REDIS_STACK_PORT:-8001}:8001" # RedisInsight UI

    volumes:
      - redis_data:/data

    networks:
      - backend

volumes:
  postgres_data:
    driver: local
    name: mono_fun_postgres_data

  redis_data:
    driver: local
    name: mono_fun_redis_data

networks:
  backend:
    driver: bridge
    name: mono_fun_backend